# LingBot-Video Dense on 2x L40S (46GB each).
# Rewriter (stages 0,1) on GPU 0 with FP8 quantization.
# DiT + VAE (stage 2) on GPU 1.
async_chunk: false
trust_remote_code: true

stages:
  # Stage 0: EXPAND (Qwen3.6-27B, no LoRA, FP8)
  - stage_id: 0
    devices: "0"
    quantization: fp8
    max_num_seqs: 1
    gpu_memory_utilization: 0.85
    max_model_len: 8192
    enforce_eager: true
    enable_lora: true
    max_lora_rank: 64
    model: "Qwen/Qwen3.6-27B"
    default_sampling_params:
      max_tokens: 6144
      temperature: 0
      detokenize: true
      bad_words: ["<think>"]

  # Stage 1: MAP (shares engine with stage 0, applies rewriter LoRA)
  - stage_id: 1
    default_sampling_params:
      max_tokens: 6144
      temperature: 0
      detokenize: true
      bad_words: ["<think>"]

  # Stage 2: Diffusion (DiT + VAE)
  - stage_id: 2
    devices: "1"
    max_num_seqs: 1
    enforce_eager: true
    default_sampling_params:
      num_inference_steps: 40
      guidance_scale: 3.0
      height: 480
      width: 832
      num_frames: 121
