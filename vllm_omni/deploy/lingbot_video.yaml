# LingBot-Video deploy: Rewriter LLM (stage 0) + Diffusion DiT (stage 1).
# Topology declared in vllm_omni/model_executor/models/lingbot_video/pipeline.py.
async_chunk: false
trust_remote_code: true

stages:
  # Stage 0: Rewriter LLM (Qwen3.5-27B + LoRA)
  # Generates structured JSON caption from user prompt.
  # model overrides the top-level HF repo so this stage loads
  # Qwen/Qwen3.6-27B instead of the diffusion model.
  - stage_id: 0
    devices: "0"
    max_num_seqs: 1
    gpu_memory_utilization: 0.55
    enforce_eager: true
    enable_lora: true
    max_lora_rank: 64
    model: "Qwen/Qwen3.6-27B"
    default_sampling_params:
      max_tokens: 6144
      temperature: 0
      detokenize: true

  # Stage 1: Diffusion (DiT + VAE)
  # Receives structured JSON caption from rewriter, encodes + denoises.
  - stage_id: 1
    devices: "1"
    max_num_seqs: 1
    enforce_eager: true
    default_sampling_params:
      num_inference_steps: 40
      guidance_scale: 3.0
      flow_shift: 3.0
