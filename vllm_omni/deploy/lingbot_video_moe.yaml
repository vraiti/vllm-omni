# LingBot-Video MoE deploy: EXPAND (stage 0) + MAP (stage 1) + MoE DiT (stage 2).
# Topology declared in vllm_omni/model_executor/models/lingbot_video/pipeline.py.
# MoE DiT (~60GB bf16) requires a dedicated GPU separate from the text encoder.
# Minimum 2x GPUs with 80GB+ VRAM each.
async_chunk: false
trust_remote_code: true

stages:
  # Stage 0: EXPAND (Qwen3.6-27B, no LoRA)
  # Generates detailed prose caption from user prompt.
  - stage_id: 0
    devices: "0"
    max_num_seqs: 1
    gpu_memory_utilization: 0.70
    max_model_len: 8192
    enforce_eager: true
    enable_lora: true
    max_lora_rank: 64
    model: "Qwen/Qwen3.6-27B"
    default_sampling_params:
      max_tokens: 6144
      temperature: 0
      detokenize: true

  # Stage 1: MAP (Qwen3.6-27B + rewriter LoRA, shares engine with stage 0)
  # Converts prose caption to structured JSON caption.
  - stage_id: 1
    default_sampling_params:
      max_tokens: 6144
      temperature: 0
      detokenize: true

  # Stage 2: MoE Diffusion (DiT + VAE)
  # 128 experts, 8 active per token, 48 layers.
  # Receives structured JSON caption from MAP, encodes + denoises.
  - stage_id: 2
    devices: "1"
    max_num_seqs: 1
    enforce_eager: true
    default_sampling_params:
      num_inference_steps: 40
      guidance_scale: 3.0
      height: 480
      width: 832
      num_frames: 121
