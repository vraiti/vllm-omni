apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: omni-demo-route
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/name: vllm-omni
    app.kubernetes.io/component: inference
  annotations:
    openshift.io/display-name: vLLM-Omni Gateway Route
spec:
  parentRefs:
  - name: data-science-gateway
    namespace: openshift-ingress
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /vllm-omni-turbo
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: vllm-omni-turbo-gateway-svc
      namespace: omni-demo
      port: 80
