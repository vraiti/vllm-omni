apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: omni-keda-demo
  namespace: omni-demo
  annotations:
    # KEDA autoscaling - disable default KServe HPA
    serving.kserve.io/autoscalerClass: external
    # Use RawDeployment mode (required for KEDA)
    serving.kserve.io/deploymentMode: RawDeployment
    # Prometheus metrics scraping
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8000"
    # Storage initializer UID (namespace UID range + 1)
    serving.kserve.io/storage-initializer-uid: "1001550001"
    # Display name
    openshift.io/display-name: vLLM-Omni KEDA Demo
    # Tell ODH to not manage routes for this InferenceService
    odh.opendatahub.io/disable-route-creation: "true"
spec:
  predictor:
    model:
      modelFormat:
        name: vllm-omni
      runtime: vllm-omni-runtime
      env:
        - name: MODEL_NAME
          value: "Tongyi-MAI/Z-Image-Turbo"
        - name: EXTRA_ARGS
          value: ""
    minReplicas: 1
    maxReplicas: 1  # KEDA will manage scaling, not KServe
