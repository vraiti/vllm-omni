apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-omni-runtime
  annotations:
    openshift.io/display-name: "vLLM-Omni Runtime"
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
  supportedModelFormats:
    - name: vllm-omni
      autoSelect: true
  containers:
    - name: kserve-container
      image: vllm/vllm-omni:v0.14.0
      command:
        - /bin/sh
        - -c
      args:
        - |
          vllm serve ${MODEL_NAME} --omni --host 0.0.0.0 --port 8000 ${EXTRA_ARGS}
      env:
        - name: MODEL_NAME
          value: "{{.Name}}"
        - name: HF_HOME
          value: "/cache/huggingface"
        - name: HOME
          value: "/cache"
        - name: EXTRA_ARGS
          value: ""
      ports:
        - name: http
          containerPort: 8000
          protocol: TCP
      resources:
        requests:
          memory: "16Gi"
          cpu: "4"
          nvidia.com/gpu: "1"
        limits:
          memory: "32Gi"
          cpu: "8"
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: cache
          mountPath: /cache
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "8Gi"
    - name: cache
      emptyDir: {}
  multiModel: false
